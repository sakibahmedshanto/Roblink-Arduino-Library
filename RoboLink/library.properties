sentence=Arduino/ESP32 companion library for the RoboLink controller app.
paragraph=Receive real-time control data (joystick, buttons, sliders, toggles, d-pad, triggers, XY pads) from the RoboLink Flutter app over WiFi (UDP), Bluetooth Classic (SPP), or generic serial (HC-05/HC-06). Send sensor data back. Simple map-like API — just call get("key") to read any value. Works on Arduino Uno/Nano/Mega (via serial BT modules) and ESP32 (WiFi + built-in BT). No protocol knowledge required.
