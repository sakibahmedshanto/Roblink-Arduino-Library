sentence=Arduino/ESP32 companion library for the RoboLink controller app
paragraph=Receive real-time control data (joystick, buttons, sliders, toggles, d-pad, triggers, XY pads) from the RoboLink Flutter app over WiFi (UDP), Bluetooth Classic (SPP), or serial (HC-05/HC-06). Send sensor data back. Simple map-like API — use get("key") to read values. Works on Arduino Uno, Nano, Mega and ESP32. No protocol knowledge required.
